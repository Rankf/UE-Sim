<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="sesGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357abd;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pdsGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#50c878;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3da35d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pdcGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5a623;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4890a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="netGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9b59b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8e44ad;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="3" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
    <marker id="arrowheadBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a90d9"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="600" y="45" text-anchor="middle" font-size="28" font-weight="bold" fill="#2c3e50">
    Soft-UE ns-3 协议栈架构
  </text>
  <text x="600" y="70" text-anchor="middle" font-size="14" fill="#7f8c8d">
    Ultra Ethernet Protocol Stack Architecture
  </text>

  <!-- Node A (Left Side) -->
  <g transform="translate(80, 100)">
    <rect x="0" y="0" width="450" height="720" rx="15" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="2" filter="url(#shadow)"/>
    <text x="225" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50">Node A (Client)</text>

    <!-- Application Layer -->
    <rect x="25" y="55" width="400" height="70" rx="8" fill="#e8e8e8" stroke="#999" stroke-width="1.5"/>
    <text x="225" y="85" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Application Layer</text>
    <text x="225" y="108" text-anchor="middle" font-size="12" fill="#666">SoftUeApplication (Client/Server)</text>

    <!-- SES Layer -->
    <rect x="25" y="145" width="400" height="120" rx="8" fill="url(#sesGrad)" stroke="#2c5aa0" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="225" y="175" text-anchor="middle" font-size="16" font-weight="bold" fill="white">SES Layer</text>
    <text x="225" y="195" text-anchor="middle" font-size="11" fill="#e8f4ff">Semantic Sub-layer</text>
    <rect x="40" y="205" width="170" height="45" rx="5" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.5)"/>
    <text x="125" y="225" text-anchor="middle" font-size="11" fill="white">SesManager</text>
    <text x="125" y="240" text-anchor="middle" font-size="9" fill="#cce5ff">消息类型/端点寻址</text>
    <rect x="230" y="205" width="170" height="45" rx="5" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.5)"/>
    <text x="315" y="225" text-anchor="middle" font-size="11" fill="white">MsnTable</text>
    <text x="315" y="240" text-anchor="middle" font-size="9" fill="#cce5ff">消息序列号跟踪</text>

    <!-- PDS Layer -->
    <rect x="25" y="285" width="400" height="120" rx="8" fill="url(#pdsGrad)" stroke="#2d8a4e" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="225" y="315" text-anchor="middle" font-size="16" font-weight="bold" fill="white">PDS Layer</text>
    <text x="225" y="335" text-anchor="middle" font-size="11" fill="#e8fff0">Packet Delivery Sub-layer</text>
    <rect x="40" y="345" width="170" height="45" rx="5" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.5)"/>
    <text x="125" y="365" text-anchor="middle" font-size="11" fill="white">PdsManager</text>
    <text x="125" y="380" text-anchor="middle" font-size="9" fill="#ccffe5">包分发/PDC管理</text>
    <rect x="230" y="345" width="170" height="45" rx="5" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.5)"/>
    <text x="315" y="365" text-anchor="middle" font-size="11" fill="white">PdsStatistics</text>
    <text x="315" y="380" text-anchor="middle" font-size="9" fill="#ccffe5">性能统计收集</text>

    <!-- PDC Layer -->
    <rect x="25" y="425" width="400" height="150" rx="8" fill="url(#pdcGrad)" stroke="#b8760a" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="225" y="455" text-anchor="middle" font-size="16" font-weight="bold" fill="white">PDC Layer</text>
    <text x="225" y="475" text-anchor="middle" font-size="11" fill="#fff8e5">Packet Delivery Context</text>
    <rect x="40" y="485" width="110" height="75" rx="5" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.5)"/>
    <text x="95" y="510" text-anchor="middle" font-size="12" font-weight="bold" fill="white">IPDC</text>
    <text x="95" y="527" text-anchor="middle" font-size="9" fill="#fff5cc">不可靠传输</text>
    <text x="95" y="542" text-anchor="middle" font-size="9" fill="#fff5cc">UUD模式</text>
    <rect x="170" y="485" width="110" height="75" rx="5" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.5)"/>
    <text x="225" y="510" text-anchor="middle" font-size="12" font-weight="bold" fill="white">TPDC</text>
    <text x="225" y="527" text-anchor="middle" font-size="9" fill="#fff5cc">可靠传输</text>
    <text x="225" y="542" text-anchor="middle" font-size="9" fill="#fff5cc">RUD/ROD模式</text>
    <rect x="300" y="485" width="110" height="75" rx="5" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.5)"/>
    <text x="355" y="510" text-anchor="middle" font-size="12" font-weight="bold" fill="white">RTOTimer</text>
    <text x="355" y="527" text-anchor="middle" font-size="9" fill="#fff5cc">超时重传</text>
    <text x="355" y="542" text-anchor="middle" font-size="9" fill="#fff5cc">计时器管理</text>

    <!-- Network Device Layer -->
    <rect x="25" y="595" width="400" height="100" rx="8" fill="url(#netGrad)" stroke="#7d3c98" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="225" y="625" text-anchor="middle" font-size="16" font-weight="bold" fill="white">Network Device</text>
    <text x="225" y="645" text-anchor="middle" font-size="11" fill="#f5e6ff">SoftUeNetDevice + SoftUeChannel</text>
    <rect x="40" y="655" width="170" height="30" rx="5" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.5)"/>
    <text x="125" y="675" text-anchor="middle" font-size="10" fill="white">MAC: 02-06-XX:XX:XX:XX</text>
    <rect x="230" y="655" width="170" height="30" rx="5" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.5)"/>
    <text x="315" y="675" text-anchor="middle" font-size="10" fill="white">FEP: 4 (Client)</text>
  </g>

  <!-- Node B (Right Side) -->
  <g transform="translate(670, 100)">
    <rect x="0" y="0" width="450" height="720" rx="15" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="2" filter="url(#shadow)"/>
    <text x="225" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50">Node B (Server)</text>

    <!-- Application Layer -->
    <rect x="25" y="55" width="400" height="70" rx="8" fill="#e8e8e8" stroke="#999" stroke-width="1.5"/>
    <text x="225" y="85" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Application Layer</text>
    <text x="225" y="108" text-anchor="middle" font-size="12" fill="#666">SoftUeApplication (Receiver)</text>

    <!-- SES Layer -->
    <rect x="25" y="145" width="400" height="120" rx="8" fill="url(#sesGrad)" stroke="#2c5aa0" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="225" y="175" text-anchor="middle" font-size="16" font-weight="bold" fill="white">SES Layer</text>
    <text x="225" y="195" text-anchor="middle" font-size="11" fill="#e8f4ff">Semantic Sub-layer</text>
    <rect x="40" y="205" width="170" height="45" rx="5" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.5)"/>
    <text x="125" y="225" text-anchor="middle" font-size="11" fill="white">SesManager</text>
    <text x="125" y="240" text-anchor="middle" font-size="9" fill="#cce5ff">请求解析/响应生成</text>
    <rect x="230" y="205" width="170" height="45" rx="5" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.5)"/>
    <text x="315" y="225" text-anchor="middle" font-size="11" fill="white">OperationMetadata</text>
    <text x="315" y="240" text-anchor="middle" font-size="9" fill="#cce5ff">操作元数据管理</text>

    <!-- PDS Layer -->
    <rect x="25" y="285" width="400" height="120" rx="8" fill="url(#pdsGrad)" stroke="#2d8a4e" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="225" y="315" text-anchor="middle" font-size="16" font-weight="bold" fill="white">PDS Layer</text>
    <text x="225" y="335" text-anchor="middle" font-size="11" fill="#e8fff0">Packet Delivery Sub-layer</text>
    <rect x="40" y="345" width="170" height="45" rx="5" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.5)"/>
    <text x="125" y="365" text-anchor="middle" font-size="11" fill="white">PdsManager</text>
    <text x="125" y="380" text-anchor="middle" font-size="9" fill="#ccffe5">接收分发/上报SES</text>
    <rect x="230" y="345" width="170" height="45" rx="5" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.5)"/>
    <text x="315" y="365" text-anchor="middle" font-size="11" fill="white">PDSHeader</text>
    <text x="315" y="380" text-anchor="middle" font-size="9" fill="#ccffe5">头部解析/序列化</text>

    <!-- PDC Layer -->
    <rect x="25" y="425" width="400" height="150" rx="8" fill="url(#pdcGrad)" stroke="#b8760a" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="225" y="455" text-anchor="middle" font-size="16" font-weight="bold" fill="white">PDC Layer</text>
    <text x="225" y="475" text-anchor="middle" font-size="11" fill="#fff8e5">Packet Delivery Context</text>
    <rect x="40" y="485" width="110" height="75" rx="5" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.5)"/>
    <text x="95" y="510" text-anchor="middle" font-size="12" font-weight="bold" fill="white">IPDC</text>
    <text x="95" y="527" text-anchor="middle" font-size="9" fill="#fff5cc">接收处理</text>
    <text x="95" y="542" text-anchor="middle" font-size="9" fill="#fff5cc">无确认</text>
    <rect x="170" y="485" width="110" height="75" rx="5" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.5)"/>
    <text x="225" y="510" text-anchor="middle" font-size="12" font-weight="bold" fill="white">TPDC</text>
    <text x="225" y="527" text-anchor="middle" font-size="9" fill="#fff5cc">ACK生成</text>
    <text x="225" y="542" text-anchor="middle" font-size="9" fill="#fff5cc">序列号验证</text>
    <rect x="300" y="485" width="110" height="75" rx="5" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.5)"/>
    <text x="355" y="510" text-anchor="middle" font-size="12" font-weight="bold" fill="white">PdcStatistics</text>
    <text x="355" y="527" text-anchor="middle" font-size="9" fill="#fff5cc">延迟统计</text>
    <text x="355" y="542" text-anchor="middle" font-size="9" fill="#fff5cc">吞吐量计算</text>

    <!-- Network Device Layer -->
    <rect x="25" y="595" width="400" height="100" rx="8" fill="url(#netGrad)" stroke="#7d3c98" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="225" y="625" text-anchor="middle" font-size="16" font-weight="bold" fill="white">Network Device</text>
    <text x="225" y="645" text-anchor="middle" font-size="11" fill="#f5e6ff">SoftUeNetDevice + SoftUeChannel</text>
    <rect x="40" y="655" width="170" height="30" rx="5" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.5)"/>
    <text x="125" y="675" text-anchor="middle" font-size="10" fill="white">MAC: 02-06-XX:XX:XX:XX</text>
    <rect x="230" y="655" width="170" height="30" rx="5" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.5)"/>
    <text x="315" y="675" text-anchor="middle" font-size="10" fill="white">FEP: 8 (Server)</text>
  </g>

  <!-- Channel Connection (Middle) -->
  <g transform="translate(530, 755)">
    <rect x="0" y="0" width="140" height="50" rx="10" fill="#34495e" stroke="#2c3e50" stroke-width="2" filter="url(#shadow)"/>
    <text x="70" y="22" text-anchor="middle" font-size="13" font-weight="bold" fill="white">SoftUeChannel</text>
    <text x="70" y="40" text-anchor="middle" font-size="10" fill="#bdc3c7">点对点传输通道</text>
  </g>

  <!-- Data Flow Arrows -->
  <!-- Node A to Channel -->
  <path d="M 505 765 L 530 780" stroke="#9b59b6" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <!-- Channel to Node B -->
  <path d="M 670 780 L 695 765" stroke="#9b59b6" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Bidirectional Arrow between nodes -->
  <path d="M 540 785 C 600 850, 600 850, 660 785" stroke="#27ae60" stroke-width="2" stroke-dasharray="5,3" fill="none"/>
  <text x="600" y="860" text-anchor="middle" font-size="11" fill="#27ae60">双向数据流</text>

  <!-- Vertical Arrows inside Node A -->
  <line x1="305" y1="225" x2="305" y2="243" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="305" y1="365" x2="305" y2="383" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="305" y1="505" x2="305" y2="523" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Legend -->
  <g transform="translate(80, 830)">
    <text x="0" y="15" font-size="14" font-weight="bold" fill="#2c3e50">图例:</text>
    <rect x="60" y="3" width="20" height="15" rx="3" fill="url(#sesGrad)"/>
    <text x="85" y="15" font-size="11" fill="#333">SES层</text>
    <rect x="140" y="3" width="20" height="15" rx="3" fill="url(#pdsGrad)"/>
    <text x="165" y="15" font-size="11" fill="#333">PDS层</text>
    <rect x="220" y="3" width="20" height="15" rx="3" fill="url(#pdcGrad)"/>
    <text x="245" y="15" font-size="11" fill="#333">PDC层</text>
    <rect x="300" y="3" width="20" height="15" rx="3" fill="url(#netGrad)"/>
    <text x="325" y="15" font-size="11" fill="#333">网络层</text>
  </g>

  <!-- Protocol Info -->
  <g transform="translate(550, 830)">
    <text x="0" y="15" font-size="12" fill="#7f8c8d">协议模式: RUD (Reliable Unordered Delivery) / UUD (Unreliable)</text>
    <text x="0" y="35" font-size="12" fill="#7f8c8d">传输速率: 512 bytes × 10 packets @ 500ns interval</text>
    <text x="0" y="55" font-size="12" fill="#27ae60">✓ 测试验证: 100% 成功率</text>
  </g>
</svg>
