<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 800" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="appGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#95a5a6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#7f8c8d;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="sesGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#357abd;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="pdsGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#50c878;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3da35d;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="pdcGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5a623;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#d4890a;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="netGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9b59b6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#8e44ad;stop-opacity:1"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" fill="#e74c3c">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" fill="#27ae60">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="800" fill="#fafafa"/>

  <!-- Title -->
  <text x="500" y="40" text-anchor="middle" font-size="24" font-weight="bold" fill="#2c3e50">
    Soft-UE 点对点通信数据流图
  </text>
  <text x="500" y="65" text-anchor="middle" font-size="14" fill="#7f8c8d">
    Client → Server 单向通信流程
  </text>

  <!-- Timeline Labels -->
  <text x="120" y="95" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">Client Node</text>
  <text x="880" y="95" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">Server Node</text>

  <!-- Client Stack -->
  <g transform="translate(30, 110)">
    <!-- Application -->
    <rect x="0" y="0" width="180" height="60" rx="8" fill="url(#appGrad)" filter="url(#shadow)"/>
    <text x="90" y="30" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Application</text>
    <text x="90" y="48" text-anchor="middle" font-size="10" fill="#ecf0f1">SendPacket()</text>

    <!-- SES -->
    <rect x="0" y="80" width="180" height="80" rx="8" fill="url(#sesGrad)" filter="url(#shadow)"/>
    <text x="90" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="white">SES Manager</text>
    <text x="90" y="125" text-anchor="middle" font-size="10" fill="#cce5ff">ProcessSendRequest()</text>
    <text x="90" y="143" text-anchor="middle" font-size="10" fill="#cce5ff">创建SesPdsRequest</text>

    <!-- PDS -->
    <rect x="0" y="180" width="180" height="80" rx="8" fill="url(#pdsGrad)" filter="url(#shadow)"/>
    <text x="90" y="205" text-anchor="middle" font-size="13" font-weight="bold" fill="white">PDS Manager</text>
    <text x="90" y="225" text-anchor="middle" font-size="10" fill="#ccffe5">ProcessSesRequest()</text>
    <text x="90" y="243" text-anchor="middle" font-size="10" fill="#ccffe5">分配PDC, 添加Header</text>

    <!-- PDC -->
    <rect x="0" y="280" width="180" height="80" rx="8" fill="url(#pdcGrad)" filter="url(#shadow)"/>
    <text x="90" y="305" text-anchor="middle" font-size="13" font-weight="bold" fill="white">PDC (IPDC)</text>
    <text x="90" y="325" text-anchor="middle" font-size="10" fill="#fff5cc">SendPacket()</text>
    <text x="90" y="343" text-anchor="middle" font-size="10" fill="#fff5cc">设置SOM/EOM/PSN</text>

    <!-- NetDevice -->
    <rect x="0" y="380" width="180" height="80" rx="8" fill="url(#netGrad)" filter="url(#shadow)"/>
    <text x="90" y="405" text-anchor="middle" font-size="13" font-weight="bold" fill="white">SoftUeNetDevice</text>
    <text x="90" y="425" text-anchor="middle" font-size="10" fill="#f5e6ff">Send()</text>
    <text x="90" y="443" text-anchor="middle" font-size="10" fill="#f5e6ff">传输到Channel</text>
  </g>

  <!-- Server Stack -->
  <g transform="translate(790, 110)">
    <!-- Application -->
    <rect x="0" y="0" width="180" height="60" rx="8" fill="url(#appGrad)" filter="url(#shadow)"/>
    <text x="90" y="30" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Application</text>
    <text x="90" y="48" text-anchor="middle" font-size="10" fill="#ecf0f1">HandlePacket()</text>

    <!-- SES -->
    <rect x="0" y="80" width="180" height="80" rx="8" fill="url(#sesGrad)" filter="url(#shadow)"/>
    <text x="90" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="white">SES Manager</text>
    <text x="90" y="125" text-anchor="middle" font-size="10" fill="#cce5ff">ProcessReceiveRequest()</text>
    <text x="90" y="143" text-anchor="middle" font-size="10" fill="#cce5ff">解析并回调App</text>

    <!-- PDS -->
    <rect x="0" y="180" width="180" height="80" rx="8" fill="url(#pdsGrad)" filter="url(#shadow)"/>
    <text x="90" y="205" text-anchor="middle" font-size="13" font-weight="bold" fill="white">PDS Manager</text>
    <text x="90" y="225" text-anchor="middle" font-size="10" fill="#ccffe5">ProcessReceivedPacket()</text>
    <text x="90" y="243" text-anchor="middle" font-size="10" fill="#ccffe5">解析Header, 路由PDC</text>

    <!-- PDC -->
    <rect x="0" y="280" width="180" height="80" rx="8" fill="url(#pdcGrad)" filter="url(#shadow)"/>
    <text x="90" y="305" text-anchor="middle" font-size="13" font-weight="bold" fill="white">PDC (IPDC)</text>
    <text x="90" y="325" text-anchor="middle" font-size="10" fill="#fff5cc">HandleReceivedPacket()</text>
    <text x="90" y="343" text-anchor="middle" font-size="10" fill="#fff5cc">验证PSN, 上报PDS</text>

    <!-- NetDevice -->
    <rect x="0" y="380" width="180" height="80" rx="8" fill="url(#netGrad)" filter="url(#shadow)"/>
    <text x="90" y="405" text-anchor="middle" font-size="13" font-weight="bold" fill="white">SoftUeNetDevice</text>
    <text x="90" y="425" text-anchor="middle" font-size="10" fill="#f5e6ff">Receive()</text>
    <text x="90" y="443" text-anchor="middle" font-size="10" fill="#f5e6ff">从Channel接收</text>
  </g>

  <!-- Data Flow Arrows -->
  <!-- Client internal flow -->
  <path d="M 120 170 L 120 186" stroke="#e74c3c" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 120 270 L 120 286" stroke="#e74c3c" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 120 370 L 120 386" stroke="#e74c3c" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 120 470 L 120 486" stroke="#e74c3c" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Server internal flow -->
  <path d="M 880 476 L 880 460" stroke="#27ae60" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>
  <path d="M 880 376 L 880 360" stroke="#27ae60" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>
  <path d="M 880 276 L 880 260" stroke="#27ae60" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>
  <path d="M 880 176 L 880 160" stroke="#27ae60" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>

  <!-- Channel transmission -->
  <rect x="300" y="530" width="400" height="50" rx="10" fill="#34495e" filter="url(#shadow)"/>
  <text x="500" y="555" text-anchor="middle" font-size="14" font-weight="bold" fill="white">SoftUeChannel</text>
  <text x="500" y="572" text-anchor="middle" font-size="11" fill="#bdc3c7">点对点传输 (无延迟仿真模型)</text>

  <!-- Channel arrows -->
  <path d="M 120 500 C 120 560, 300 555, 300 555" stroke="#e74c3c" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M 700 555 C 700 555, 880 560, 880 500" stroke="#e74c3c" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <!-- Data Structure Labels -->
  <g transform="translate(230, 130)">
    <rect x="0" y="0" width="140" height="35" rx="5" fill="#fff3cd" stroke="#f5a623" stroke-dasharray="4"/>
    <text x="70" y="22" text-anchor="middle" font-size="10" fill="#856404">OperationMetadata</text>
  </g>

  <g transform="translate(230, 210)">
    <rect x="0" y="0" width="140" height="35" rx="5" fill="#d4edda" stroke="#28a745" stroke-dasharray="4"/>
    <text x="70" y="22" text-anchor="middle" font-size="10" fill="#155724">SesPdsRequest</text>
  </g>

  <g transform="translate(230, 310)">
    <rect x="0" y="0" width="140" height="35" rx="5" fill="#cce5ff" stroke="#004085" stroke-dasharray="4"/>
    <text x="70" y="22" text-anchor="middle" font-size="10" fill="#004085">PDSHeader + Packet</text>
  </g>

  <g transform="translate(230, 420)">
    <rect x="0" y="0" width="140" height="35" rx="5" fill="#e2d5f3" stroke="#9b59b6" stroke-dasharray="4"/>
    <text x="70" y="22" text-anchor="middle" font-size="10" fill="#5c2d7e">ns3::Packet</text>
  </g>

  <!-- Server side data labels -->
  <g transform="translate(630, 130)">
    <rect x="0" y="0" width="140" height="35" rx="5" fill="#fff3cd" stroke="#f5a623" stroke-dasharray="4"/>
    <text x="70" y="22" text-anchor="middle" font-size="10" fill="#856404">PdcSesRequest</text>
  </g>

  <g transform="translate(630, 210)">
    <rect x="0" y="0" width="140" height="35" rx="5" fill="#d4edda" stroke="#28a745" stroke-dasharray="4"/>
    <text x="70" y="22" text-anchor="middle" font-size="10" fill="#155724">Packet Metadata</text>
  </g>

  <g transform="translate(630, 310)">
    <rect x="0" y="0" width="140" height="35" rx="5" fill="#cce5ff" stroke="#004085" stroke-dasharray="4"/>
    <text x="70" y="22" text-anchor="middle" font-size="10" fill="#004085">Parsed Header</text>
  </g>

  <g transform="translate(630, 420)">
    <rect x="0" y="0" width="140" height="35" rx="5" fill="#e2d5f3" stroke="#9b59b6" stroke-dasharray="4"/>
    <text x="70" y="22" text-anchor="middle" font-size="10" fill="#5c2d7e">ns3::Packet</text>
  </g>

  <!-- Sequence Numbers -->
  <g transform="translate(30, 600)">
    <text x="0" y="0" font-size="13" font-weight="bold" fill="#2c3e50">数据包序列:</text>
    <g transform="translate(0, 15)">
      <rect x="0" y="0" width="60" height="25" rx="5" fill="#3498db"/>
      <text x="30" y="17" text-anchor="middle" font-size="11" fill="white">Pkt 1</text>
      <text x="30" y="40" text-anchor="middle" font-size="9" fill="#666">SOM=1</text>
    </g>
    <g transform="translate(70, 15)">
      <rect x="0" y="0" width="60" height="25" rx="5" fill="#3498db"/>
      <text x="30" y="17" text-anchor="middle" font-size="11" fill="white">Pkt 2</text>
    </g>
    <g transform="translate(140, 15)">
      <rect x="0" y="0" width="60" height="25" rx="5" fill="#3498db"/>
      <text x="30" y="17" text-anchor="middle" font-size="11" fill="white">...</text>
    </g>
    <g transform="translate(210, 15)">
      <rect x="0" y="0" width="60" height="25" rx="5" fill="#3498db"/>
      <text x="30" y="17" text-anchor="middle" font-size="11" fill="white">Pkt 10</text>
      <text x="30" y="40" text-anchor="middle" font-size="9" fill="#666">EOM=1</text>
    </g>
  </g>

  <!-- Test Results -->
  <g transform="translate(400, 600)">
    <rect x="0" y="0" width="280" height="100" rx="10" fill="#d4edda" stroke="#28a745" stroke-width="2"/>
    <text x="140" y="25" text-anchor="middle" font-size="14" font-weight="bold" fill="#155724">✓ 测试结果</text>
    <text x="20" y="48" font-size="11" fill="#155724">发送: 10/10 包 (100%)</text>
    <text x="20" y="68" font-size="11" fill="#155724">接收: 10/10 包 (100%)</text>
    <text x="20" y="88" font-size="11" fill="#155724">协议处理: SES/PDS 全部成功</text>
  </g>

  <!-- Legend -->
  <g transform="translate(700, 600)">
    <text x="0" y="15" font-size="12" font-weight="bold" fill="#2c3e50">图例</text>
    <line x1="0" y1="35" x2="40" y2="35" stroke="#e74c3c" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="50" y="40" font-size="11" fill="#333">发送方向</text>
    <line x1="0" y1="60" x2="40" y2="60" stroke="#27ae60" stroke-width="3" marker-end="url(#arrowGreen)"/>
    <text x="50" y="65" font-size="11" fill="#333">接收处理</text>
    <rect x="0" y="75" width="40" height="15" rx="3" fill="none" stroke="#f5a623" stroke-dasharray="4"/>
    <text x="50" y="87" font-size="11" fill="#333">数据结构</text>
  </g>

  <!-- Protocol Header Info -->
  <g transform="translate(30, 720)">
    <rect x="0" y="0" width="940" height="60" rx="8" fill="#f8f9fa" stroke="#dee2e6"/>
    <text x="20" y="25" font-size="12" font-weight="bold" fill="#495057">PDSHeader 结构:</text>
    <text x="20" y="45" font-size="11" fill="#6c757d">
      Version(1B) | TC(1B) | SrcFEP(4B) | DstFEP(4B) | NextHdr(1B) | SOM(1b) | EOM(1b) | Seq(4B) | PDC_ID(2B) | PayloadLen(2B) | Payload
    </text>
  </g>
</svg>
